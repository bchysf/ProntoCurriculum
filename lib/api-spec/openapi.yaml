openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Experiences
    description: Personal experience vault CRUD.
  - name: AI
    description: AI-powered CV generation and optimization.
  - name: TailoredCVs
    description: Saved tailored CVs CRUD.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully — user is authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /fetch-job:
    post:
      tags: [AI]
      operationId: fetchJobDescription
      summary: Scrape a job posting URL and return clean text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FetchJobRequest'
      responses:
        '200':
          description: Text extracted from the job page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetchJobResponse'
        '400':
          description: Missing or invalid URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Scraping failed or no content found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /tailor-cv:
    post:
      tags: [AI]
      operationId: tailorCv
      summary: Generate a job-tailored CV using AI and the user's saved experiences
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TailorCvRequest'
      responses:
        '200':
          description: Tailored CV data generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TailorCvEnvelope'
        '400':
          description: Job description missing or too short.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: AI generation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /tailored-cvs:
    get:
      tags: [TailoredCVs]
      operationId: listTailoredCvs
      summary: List all saved tailored CVs for the authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Tailored CV list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TailoredCvListEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /tailored-cvs/{id}:
    delete:
      tags: [TailoredCVs]
      operationId: deleteTailoredCv
      summary: Delete a saved tailored CV
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tailored CV deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Tailored CV not found or not owned by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /experiences:
    get:
      tags: [Experiences]
      operationId: listExperiences
      summary: List all saved experiences for the authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Experience list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperienceListEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Experiences]
      operationId: createExperience
      summary: Create a new saved experience
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExperienceInput'
      responses:
        '201':
          description: Experience created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperienceEnvelope'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /experiences/{id}:
    put:
      tags: [Experiences]
      operationId: updateExperience
      summary: Update a saved experience
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExperienceInput'
      responses:
        '200':
          description: Experience updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperienceEnvelope'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Experience not found or not owned by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Experiences]
      operationId: deleteExperience
      summary: Delete a saved experience
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Experience deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Experience not found or not owned by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    StoredExperience:
      type: object
      required: [id, userId, company, role, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        company:
          type: string
        role:
          type: string
        city:
          type: [string, 'null']
        startDate:
          type: [string, 'null']
        endDate:
          type: [string, 'null']
        isCurrent:
          type: boolean
        description:
          type: [string, 'null']
        skills:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ExperienceInput:
      type: object
      required: [company, role]
      properties:
        company:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        city:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isCurrent:
          type: boolean
        description:
          type: string
        skills:
          type: array
          items:
            type: string
    ExperienceListEnvelope:
      type: object
      required: [experiences]
      properties:
        experiences:
          type: array
          items:
            $ref: '#/components/schemas/StoredExperience'
    ExperienceEnvelope:
      type: object
      required: [experience]
      properties:
        experience:
          $ref: '#/components/schemas/StoredExperience'
    DeleteSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    FetchJobRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          minLength: 1
    FetchJobResponse:
      type: object
      required: [text]
      properties:
        text:
          type: string
    TailorCvRequest:
      type: object
      required: [jobDescription]
      properties:
        jobDescription:
          type: string
          minLength: 50
        experienceIds:
          type: array
          description: Optional list of archived experience IDs to use. If omitted, all saved experiences are considered.
          items:
            type: string
    TailoredCVExperience:
      type: object
      required: [id, company, role, city, from, to, desc]
      properties:
        id:
          type: string
        company:
          type: string
        role:
          type: string
        city:
          type: string
        from:
          type: string
        to:
          type: string
        desc:
          type: string
    TailoredCVData:
      type: object
      required: [firstName, lastName, title, email, phone, city, linkedin, summary, experiences, education, skills, languages]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        title:
          type: string
        email:
          type: string
        phone:
          type: string
        city:
          type: string
        linkedin:
          type: string
        summary:
          type: string
        experiences:
          type: array
          items:
            $ref: '#/components/schemas/TailoredCVExperience'
        education:
          type: array
          items:
            type: object
        skills:
          type: array
          items:
            type: string
        languages:
          type: array
          items:
            type: object
    TailorCvEnvelope:
      type: object
      required: [cvData]
      properties:
        cvData:
          $ref: '#/components/schemas/TailoredCVData'
        savedCvId:
          type: string
          description: ID of the auto-saved tailored CV record.
    StoredTailoredCv:
      type: object
      required: [id, userId, jobTitle, jobDescription, cvData, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        jobTitle:
          type: string
        jobDescription:
          type: string
        cvData:
          $ref: '#/components/schemas/TailoredCVData'
        createdAt:
          type: string
          format: date-time
    TailoredCvListEnvelope:
      type: object
      required: [tailoredCvs]
      properties:
        tailoredCvs:
          type: array
          items:
            $ref: '#/components/schemas/StoredTailoredCv'

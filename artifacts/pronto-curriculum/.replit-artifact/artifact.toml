kind = "web"
previewPath = "/"
title = "ProntoCurriculum"
version = "1.0.0"
id = "artifacts/pronto-curriculum"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22436

[services.development]
run = "pnpm --filter @workspace/pronto-curriculum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pronto-curriculum", "run", "build" ]
publicDir = "artifacts/pronto-curriculum/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22436"
BASE_PATH = "/"
